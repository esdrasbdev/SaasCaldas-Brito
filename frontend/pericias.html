<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perícias - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <h1><i class="fa-solid fa-clipboard-list"></i> Gestão de Perícias</h1>
        <button id="btn-nova-pericia" class="btn-primary"><i class="fa-solid fa-plus"></i> Nova Perícia</button>
      </div>
      
      <!-- Modal Padronizado -->
      <div id="form-container" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <form id="form-pericia">
            <div class="modal-header">
              <h2>Agendar Nova Perícia</h2>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label for="processo-select">Processo Vinculado</label>
                <select id="processo-select" required></select>
              </div>
              
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                  <label for="pericia-data">Data e Hora</label>
                  <input type="datetime-local" id="pericia-data" required>
                </div>
                <div class="form-group">
                  <label for="pericia-perito">Nome do Perito</label>
                  <input type="text" id="pericia-perito" placeholder="Ex: Dr. João da Silva">
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 0;">
                <label for="pericia-local">Local</label>
                <input type="text" id="pericia-local" placeholder="Ex: IMESC..." required>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar Perícia</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Tabela de Perícias -->
      <div class="card-section">
        <h2>Perícias Agendadas</h2>
        <div class="table-responsive">
          <table class="recent-table">
            <thead>
              <tr><th>Processo</th><th>Data</th><th>Local</th><th>Perito</th><th>Ações</th></tr>
            </thead>
            <tbody id="lista-pericias"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/pericias.js"></script>
</body>
</html>
