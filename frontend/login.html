<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jurídico</title>
    <link rel="stylesheet" href="css/reset.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; font-family: sans-serif; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #475569; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: #2563eb; ring: 2px solid #2563eb; }
        button { width: 100%; padding: 0.875rem; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 1rem; text-align: center; display: none; background: #fef2f2; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acesso Restrito</h2>
        <form id="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="btn-login">Entrar no Sistema</button>
            <div id="login-error" class="error-msg"></div>
        </form>
    </div>

    <!-- SCRIPTS MODULE -->
    <script type="module">
        import { AuthAPI } from './js/auth.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btn.textContent = 'Autenticando...';
            btn.disabled = true;
            errorDiv.style.display = 'none';

            const result = await AuthAPI.login(email, password);

            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = 'Erro: ' + (result.error || 'Falha no login');
                errorDiv.style.display = 'block';
                btn.textContent = 'Entrar no Sistema';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
