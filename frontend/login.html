<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Caldas & Brito Advocacia</title>
  
  <!-- CSS Global -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
</head>
<body class="login-page">

  <!-- Elementos de Fundo Animados -->
  <div class="login-blob blob-1"></div>
  <div class="login-blob blob-2"></div>

  <!-- Cartão de Login -->
  <div class="login-card">
    <div class="brand-area">
      <div class="brand-logo">
        <i class="fa-solid fa-scale-balanced"></i>
      </div>
      <h1 class="brand-name">Caldas & Brito</h1>
      <p class="brand-subtitle">Sistema de Gestão Jurídica</p>
    </div>

    <form id="login-form">
      <div class="form-group" style="margin-bottom: 0;">
        <label for="email">E-mail Corporativo</label>
        <div class="login-input-group">
          <input type="email" id="email" placeholder="advogado@caldasbrito.com" required>
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="password">Senha</label>
        <div class="login-input-group">
          <input type="password" id="password" placeholder="••••••••" required>
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>

      <div id="error-msg" class="error-message" style="display: none; margin-bottom: 16px;"></div>

      <button type="submit" class="btn btn-primary btn-login">
        <span id="btn-text">Acessar Sistema</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
    
    <div style="margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--cinza-medio);">
      <p>&copy; 2026 Caldas & Brito Advocacia.</p>
    </div>
  </div>

  <!-- Overlay de Boas-vindas (Oculto inicialmente) -->
  <div id="welcome-overlay" class="welcome-overlay">
    <div class="welcome-content">
      <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: #4ade80; margin-bottom: 32px;"></i>
      <h2 id="welcome-title" style="font-size: 3.5rem; margin-bottom: 0; font-weight: 600; letter-spacing: -0.02em;">Bem-vindo,</h2>
      <h3 id="welcome-name" style="font-size: 4.5rem; font-weight: 800; background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: -10px;">Usuário</h3>
      <p style="margin-top: 32px; font-size: 1.2rem; color: rgba(255,255,255,0.8);">Preparando seu ambiente...</p>
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- Script Lógico -->
  <script type="module">
    import { supabase } from './js/supabase.js';

    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnText = document.getElementById('btn-text');
    const welcomeOverlay = document.getElementById('welcome-overlay');
    const welcomeName = document.getElementById('welcome-name');

    // Limpa sessão anterior ao entrar no login
    localStorage.removeItem('user_role');
    supabase.auth.signOut();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Feedback visual de carregamento
      const btn = loginForm.querySelector('button');
      const originalBtnContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verificando...';
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // 1. Autenticação Supabase
        const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (authError) throw authError;

        // 2. Buscar dados do usuário (Nome e Role)
        const { data: userData, error: userError } = await supabase
          .from('usuarios')
          .select('nome, role')
          .eq('email', email)
          .single();

        if (userError || !userData) throw new Error('Usuário não encontrado no registro interno.');
        if (!userData.ativo && userData.ativo !== undefined) throw new Error('Usuário inativo. Contate o administrador.');

        // 3. Salvar role localmente
        localStorage.setItem('user_role', userData.role);

        // 4. Exibir Tela de Boas-vindas
        const primeiroNome = userData.nome.split(' ')[0];
        
        // Define gênero baseado na última letra do nome (A = feminino, Outros = masculino)
        const saudacao = primeiroNome.toLowerCase().endsWith('a') ? 'Bem-vinda,' : 'Bem-vindo,';
        document.getElementById('welcome-title').textContent = saudacao;
        welcomeName.textContent = primeiroNome;

        // Oculta o cartão de login suavemente (para não aparecer por baixo depois)
        document.querySelector('.login-card').classList.add('hidden');
        
        // Mostra o overlay sobre o form
        welcomeOverlay.style.display = 'flex';

        // Aguarda brevemente para leitura (agilizado)
        setTimeout(() => {
          // Adiciona classe que desliza o overlay inteiro para a direita
          welcomeOverlay.classList.add('slide-out-animation');
          
          // Quando a animação terminar (0.8s), redireciona
          setTimeout(() => {
            window.location.href = 'index.html'; // Redireciona para Dashboard
          }, 600); 
        }, 1000); // Reduzido de 2s para 1s para agilizar login

      } catch (error) {
        console.error(error);
        errorMsg.textContent = 'Acesso negado: Verifique suas credenciais.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = originalBtnContent;
      }
    });
  </script>
</body>
</html>
