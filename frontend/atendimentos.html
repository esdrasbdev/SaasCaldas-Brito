<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atendimentos - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Registro de Atendimentos</h1>
          <p>Histórico de reuniões e contatos com clientes.</p>
        </div>
        <button id="btn-novo-atendimento" class="btn-primary"><i class="fa-solid fa-plus"></i> Novo Atendimento</button>
      </div>
      
      <div id="lista-atendimentos-container"></div>

      <!-- Modal Atendimento -->
      <div id="modal-atendimento" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <form id="form-atendimento">
            <div class="modal-header"><h2>Novo Atendimento</h2></div>
            <div class="modal-body">
              <div class="form-group">
                <label>Cliente</label>
                <select id="atend-cliente" required><option>Carregando...</option></select>
              </div>
              <div class="form-group">
                <label>Data/Hora</label>
                <input type="datetime-local" id="atend-data" required>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label>Anotações / Resumo</label>
                <textarea id="atend-anotacoes" rows="4" placeholder="Descreva o que foi tratado..." required></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar Registro</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/atendimentos.js"></script>
</body>
</html>
