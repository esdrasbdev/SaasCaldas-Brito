<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiências - Sistema Jurídico</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
  <div class="app-container">
    <nav id="sidebar" class="sidebar"></nav>
    
    <main class="main-content">
      <div class="page-header">
        <h1><i class="fa-solid fa-gavel"></i> Gestão de Audiências</h1>
        <button id="btn-nova-audiencia" class="btn-primary"><i class="fa-solid fa-plus"></i> Nova Audiência</button>
      </div>
      
      <!-- Modal Padronizado -->
      <div id="form-container" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <form id="form-audiencia">
            <div class="modal-header">
              <h2>Nova Audiência</h2>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label for="processo-select">Processo Vinculado</label>
                <select id="processo-select" required></select>
              </div>
              <div class="form-group">
                <label for="audiencia-data">Data e Hora</label>
                <input type="datetime-local" id="audiencia-data" required>
              </div>
              <div class="form-group">
                <label for="audiencia-local">Local</label>
                <input type="text" id="audiencia-local" placeholder="Ex: Fórum Central, Link..." required>
              </div>
              <div class="form-group">
                <label for="audiencia-tipo">Tipo</label>
                <input type="text" id="audiencia-tipo" placeholder="Ex: Conciliação" required>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label>Observações</label>
                <textarea id="audiencia-obs" rows="2"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Tabela de Audiências -->
      <div class="card-section">
        <h2>Próximas Audiências</h2>
        <div class="table-responsive">
          <table class="recent-table">
            <thead>
              <tr><th>Processo</th><th>Data</th><th>Local</th><th>Tipo</th><th>Ações</th></tr>
            </thead>
            <tbody id="lista-audiencias"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script><script type="module" src="js/auth.js"></script><script type="module" src="js/guard.js"></script><script type="module" src="js/sidebar.js"></script><script type="module" src="js/audiencias.js"></script>
</body>
</html>
